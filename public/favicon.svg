<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5B4AA0"/>
      <stop offset="50%" stop-color="#7C6CFF"/>
      <stop offset="100%" stop-color="#A89BFF"/>
    </linearGradient>
  </defs>
  <!-- Beamed eighth notes ♫ -->
  <g fill="url(#g)">
    <!-- Left note head -->
    <ellipse cx="8" cy="25" rx="4" ry="3" transform="rotate(-15 8 25)"/>
    <!-- Right note head -->
    <ellipse cx="22" cy="23" rx="4" ry="3" transform="rotate(-15 22 23)"/>
    <!-- Left stem -->
    <rect x="11" y="5" width="2" height="20" rx="1"/>
    <!-- Right stem -->
    <rect x="25" y="3" width="2" height="20" rx="1"/>
    <!-- Top beam -->
    <rect x="11" y="3" width="16" height="2.5" rx="1" transform="rotate(-5 19 4)"/>
    <!-- Bottom beam -->
    <rect x="11" y="8" width="16" height="2.5" rx="1" transform="rotate(-5 19 9)"/>
  </g>
</svg>
